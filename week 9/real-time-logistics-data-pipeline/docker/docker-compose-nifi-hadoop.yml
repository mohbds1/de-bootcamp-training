networks:
  itvdelabnw:
    external: true

services:
  nifi:
    image: apache/nifi:latest
    container_name: nifi_assignment
    ports:
      - "8443:8443"

    environment:
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=DataEngineer123456
      - NIFI_JVM_HEAP_INIT=512m
      - NIFI_JVM_HEAP_MAX=1024m

    volumes:
      - ../data/input:/opt/data_input
      - ../data/errors:/opt/data_errors
      - ../custom_nars:/opt/nifi/nifi-current/nar_extensions
      - ../hadoop:/opt/hadoop_conf

    networks:
      - itvdelabnw

    depends_on:
      - itvdelab

    deploy:
      resources:
        limits:
          memory: 2G

  itvdelab:
    image: itversity/itvdelab
    container_name: itvdelab_assignment
    hostname: itvdelab

    ports:
      - "18080:8888"
      - "19879:9870"
      - "11000:10000"
      - "9000:9000"
      - "9866:9866"

    environment:
      SHELL: /bin/bash
      
    networks:
      - itvdelabnw

    deploy:
      resources:
        limits:
          memory: 3G  