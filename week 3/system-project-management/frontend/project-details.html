<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Project Details</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="navbar">
        <div class="container">
            <h2>Task Management System</h2>
            <div class="nav-links">
                <a href="manager-dashboard.html" id="nav-dashboard">Dashboard</a>
                <a href="projects.html" id="nav-projects">Projects</a>
                <a href="users.html" id="nav-users">Users</a>
                <a href="my-tasks.html" id="nav-my-tasks" style="display:none;">My Tasks</a>
                <div class="nav-user-info" id="nav-user"></div>
                <a href="#" id="logoutBtn">Logout</a>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Project Info -->
        <div id="projectInfoCard" class="card">
            <!-- Project details will be loaded here by JS -->
        </div>

        <!-- Create Task Form -->
        <div class="card">
            <h2 id="formTitle">Create Task</h2>
            <form id="taskForm">
                <input type="hidden" id="taskId" />
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="task_title" required />
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="task_description" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Assign To</label>
                    <select id="assigned_to"></select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Status</label>
                        <select id="task_status">
                            <option value="todo">To Do</option>
                            <option value="in_progress">In Progress</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                        <div class="form-group">
                        <label>Priority</label>
                        <select id="task_priority">
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Due Date</label>
                    <input type="date" id="due_date" />
                </div>
                <div>
                    <button type="submit" class="btn btn-primary">Save Task</button>
                    <button type="button" id="cancelBtn" class="btn btn-secondary" style="display: none;">Cancel</button>
                </div>
            </form>
            <div id="formErrorMessage" class="error-message" style="display: none; margin-top: 16px;"></div>
        </div>

        <!-- Tasks Section -->
        <div id="tasksGrid">
            <!-- Task table will be loaded here -->
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/project-details.js"></script>
</body>
</html>
